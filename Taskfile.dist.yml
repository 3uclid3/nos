---
version: '3'

env:
  BUILD_TYPE: '{{.BUILD_TYPE | default "debug"}}'
  BUILD_ARCH: '{{.BUILD_ARCH | default "x86_64"}}'
  BUILD_DIR: 'builddir'

dotenv: [ '.env' ]

tasks:
  setup:
    cmds:
      - meson setup $BUILD_DIR --buildtype $BUILD_TYPE --cross-file cross-file/meson-kernel-$BUILD_ARCH.cross-file {{.CLI_ARGS}}
  compile:
    cmds:
      - meson compile -C $BUILD_DIR kernel.elf
  compile-test:
    cmds:
      - meson compile -C $BUILD_DIR kernel.test
  test:
    cmds:
      - meson test -C $BUILD_DIR kernel:kernel
  iso:
    cmds:
      - meson compile -C $BUILD_DIR iso
  qemu:
    cmds:
      - qemu-system-$BUILD_ARCH -cdrom $BUILD_DIR/nos-$BUILD_ARCH.iso
  generate-coverage:
    cmds:
      - ninja -C $BUILD_DIR coverage-xml

